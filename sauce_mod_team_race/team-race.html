<!DOCTYPE html>
<html class="transparent-bg" tabindex="0">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
        <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';"/>

        <title>Team Race Score - Sauce for Zwift™</title>

        <script src="/pages/src/preloads.js"></script>

        <link id="favicon" rel="shortcut icon" href="/pages/images/favicon.png"/>
        <link rel="stylesheet" href="/pages/css/common.css"/>
        <link rel="stylesheet" href="team-race.css"/>

        <script type="module">
            import {main} from './team-race.mjs';
            main();
        </script>
    </head>
    <body>
        <div id="titlebar" class="always-visible">
            <header>
                <div class="title">Team Race Score</div>
                <div class="filler"></div>
                <div class="buttons">
                    <div title="Minimize" class="button minimize electron-only"><ms>minimize</ms></div>
                    <div title="Close" class="button close electron-only"><ms>close</ms></div>
                </div>
            </header>
        </div>
        <div id="content">
            <div class="no-data">Waiting for race data...</div>

            <div class="scoreboard hidden">
                <!-- Total scores header -->
                <div class="total-scores">
                    <div class="team team-rtb">
                        <span class="team-name">RtB</span>
                        <span class="team-score" id="score-rtb">0</span>
                    </div>
                    <div class="score-divider">
                        <span class="score-of">/&thinsp;35</span>
                    </div>
                    <div class="team team-fellowship">
                        <span class="team-score" id="score-fellowship">0</span>
                        <span class="team-name">Fellowship</span>
                    </div>
                </div>

                <!-- Score bar -->
                <div class="score-bar">
                    <div class="score-bar-rtb" id="bar-rtb"></div>
                    <div class="score-bar-fellowship" id="bar-fellowship"></div>
                </div>

                <!-- Category results -->
                <div class="categories" id="categories"></div>

                <!-- Bonus points -->
                <div class="bonuses">
                    <div class="section-title">Bonus Points</div>
                    <div class="bonus-list" id="bonus-list"></div>
                </div>

                <!-- Rider count -->
                <div class="rider-count">
                    <span id="rider-count">0</span> tagged riders found
                </div>
            </div>
        </div>
    </body>
</html>
