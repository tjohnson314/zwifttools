<!DOCTYPE html>
<html class="passive-overlay-scrollbars" data-settings-key="pacman-settings-v1">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
        <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';"/>
        <title>Pacman Scotland</title>
        <script src="/pages/src/preloads.js"></script>
        <link rel="stylesheet" href="/pages/css/common.css"/>
        <link rel="stylesheet" href="/pages/css/map.css"/>
        <link rel="stylesheet" href="pacman.css"/>
        <script type="module">
            import {main} from './pacman.mjs';
            main();
        </script>
    </head>
    <body>
        <div id="titlebar">
            <header>
                <div class="logo"><img src="/pages/images/icon128.png"/></div>
                <div class="title">
                    <div class="top">Pacman Scotland</div>
                    <div class="bottom" id="status">Initializing...</div>
                </div>
                <div class="filler"></div>
                <div class="buttons">
                    <div title="Minimize" class="button minimize electron-only"><ms>minimize</ms></div>
                    <div title="Close this window" class="button close electron-only"><ms>close</ms></div>
                </div>
            </header>
        </div>

        <div id="content">
            <div class="hud">
                <div class="chip"><span>Lives</span><strong id="lives">3</strong></div>
                <div class="chip"><span>Score</span><strong id="score">0</strong></div>
                <div class="chip"><span>Pellets</span><strong id="pellets">0</strong></div>
                <div class="chip"><span>Collision</span><strong id="collision-threshold">-</strong></div>
                <div class="chip chip-select">
                    <span>Difficulty</span>
                    <select id="difficulty-select">
                        <option value="easy">Easy</option>
                        <option value="normal" selected>Normal</option>
                        <option value="hard">Hard</option>
                        <option value="pro">Pro</option>
                        <option value="max">Max</option>
                    </select>
                </div>
            </div>

            <div class="power-bar-container" id="power-bar-container">
                <div class="power-bar-track">
                    <div class="power-bar-fill" id="power-bar-fill"></div>
                </div>
                <span class="power-bar-label" id="power-bar-label">0 / 500W</span>
            </div>

            <div class="message hidden" id="message"></div>
            <div class="game-layout">
                <div id="map" class="map"></div>
                <aside class="ghost-panel" id="ghost-panel">
                    <table class="ghost-table">
                        <thead><tr><th>Ghost</th><th>Dist</th><th>Grade</th><th>Speed</th></tr></thead>
                        <tbody>
                            <tr><td><span class="ghost-label"><span class="ghost-chip" id="ghost-chip-1"></span><span id="ghost-name-1">1</span></span></td><td id="ghost-dist-1">-</td><td id="ghost-grade-1">-</td><td id="ghost-speed-1">-</td></tr>
                            <tr><td><span class="ghost-label"><span class="ghost-chip" id="ghost-chip-2"></span><span id="ghost-name-2">2</span></span></td><td id="ghost-dist-2">-</td><td id="ghost-grade-2">-</td><td id="ghost-speed-2">-</td></tr>
                            <tr><td><span class="ghost-label"><span class="ghost-chip" id="ghost-chip-3"></span><span id="ghost-name-3">3</span></span></td><td id="ghost-dist-3">-</td><td id="ghost-grade-3">-</td><td id="ghost-speed-3">-</td></tr>
                            <tr><td><span class="ghost-label"><span class="ghost-chip" id="ghost-chip-4"></span><span id="ghost-name-4">4</span></span></td><td id="ghost-dist-4">-</td><td id="ghost-grade-4">-</td><td id="ghost-speed-4">-</td></tr>
                        </tbody>
                    </table>
                    <div class="hunter-debug">
                        <div class="hunter-debug-title">
                            Hunter Debug
                            <button id="hunter-debug-copy-btn" class="hunter-debug-copy-btn">Copy</button>
                        </div>
                        <pre id="hunter-debug-log" class="hunter-debug-log">Waiting for Hunter decisions...</pre>
                    </div>
                </aside>
            </div>
        </div>
    </body>
</html>
